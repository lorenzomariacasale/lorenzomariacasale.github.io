{{ range .Params.authors }}
  {{ $author := site.GetPage (printf "authors/%s" .) }}
  {{ if $author }}
    {{ with $author.Params.website }}
      <a href="{{ . }}" target="_blank" rel="noopener">{{ $author.Params.name }}</a>
    {{ else }}
      {{ $author.Params.name }}
    {{ end }}
  {{ end }}
{{ end }}
